 <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background glow-clear"></div>

  <main class="container">
    <div class="card">
      <h1>Weather App</h1>
      <p class="subtitle">Consulte o clima de qualquer cidade</p>

      <div class="search-box">
        <input
          type="text"
          id="cityInput"
          placeholder="Digite o nome da cidade"
        />
        <button id="searchBtn">Buscar</button>
      </div>

      <p id="message" class="message"></p>

      <div id="loading" class="loading hidden">Buscando clima...</div>

      <section id="weatherBox" class="weather-box hidden">
        <div class="main-weather">
          <div>
            <h2 id="cityName">Cidade</h2>
            <div class="weather-description">
              <span id="weatherIcon">☀️</span>
              <span id="weatherText">Céu limpo</span>
            </div>
          </div>
          <div class="temperature" id="temperature">24°C</div>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <span>Vento</span>
            <strong id="wind">0 km/h</strong>
          </div>

          <div class="info-card">
            <span>Sensação</span>
            <strong id="feelsLike">0°C</strong>
          </div>

          <div class="info-card">
            <span>Umidade</span>
            <strong id="humidity">0%</strong>
          </div>

          <div class="info-card">
            <span>Hora local</span>
            <strong id="localTime">--:--</strong>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
