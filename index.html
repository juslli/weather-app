<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-glow"></div>

  <main class="container">
    <section class="weather-card">
      <h1>Weather App</h1>
      <p class="subtitle">Consulte o clima de qualquer cidade</p>

      <div class="search-box">
        <input
          type="text"
          id="cityInput"
          placeholder="Digite uma cidade..."
        />
        <button id="searchBtn">Buscar</button>
      </div>

      <div id="message" class="message"></div>

      <div id="weatherResult" class="weather-result hidden">
        <div class="top-info">
          <div>
            <h2 id="cityName">Cidade</h2>
            <p id="weatherDescription">Descrição</p>
          </div>
          <div class="temp-box">
            <span id="temperature">--°C</span>
          </div>
        </div>

        <div class="details">
          <div class="detail-card">
            <span class="label">Vento</span>
            <strong id="windSpeed">-- km/h</strong>
          </div>

          <div class="detail-card">
            <span class="label">Sensação</span>
            <strong id="apparentTemp">--°C</strong>
          </div>

          <div class="detail-card">
            <span class="label">Umidade</span>
            <strong id="humidity">--%</strong>
          </div>

          <div class="detail-card">
            <span class="label">Hora local</span>
            <strong id="timeNow">--</strong>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
